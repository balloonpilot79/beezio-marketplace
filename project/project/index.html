<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bumblebee.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Mobile Optimizations -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Beezio" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#d97706" />
    <meta name="msapplication-TileColor" content="#d97706" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/bumblebee.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/bumblebee.svg" />

    <!-- Description for Mobile -->
    <meta
      name="description"
      content="The revolutionary affiliate marketing ecommerce platform where sellers, affiliates, and causes thrive together"
    />
    <meta name="keywords" content="affiliate marketing, ecommerce, sellers, fundraising, mobile commerce" />

    <!-- Cache Buster: Force fresh CSS load - Nov 11 2025 -->
    <meta name="build-version" content="3.0.1" />
    <meta name="build-timestamp" content="1731283200" />

    <title>Beezio - Affiliate Marketing Ecommerce Platform</title>

    <!-- Minimal critical CSS for pre-app loading state -->
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #fff7ed;
      }

      #root {
        min-height: 100vh;
      }

      .beezio-preload {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.35), transparent 40%),
          radial-gradient(circle at 90% 80%, rgba(249, 115, 22, 0.25), transparent 45%),
          linear-gradient(135deg, #fffbeb, #fff7ed 45%, #fff1f2);
      }

      .beezio-preload-card {
        width: 100%;
        max-width: 560px;
        text-align: center;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(217, 119, 6, 0.18);
        border-radius: 20px;
        padding: 36px 24px 30px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.1);
        backdrop-filter: blur(4px);
      }

      .beezio-preload-logo {
        width: 76px;
        height: 76px;
        object-fit: contain;
        margin: 0 auto 14px;
        display: block;
        filter: drop-shadow(0 8px 14px rgba(217, 119, 6, 0.24));
      }

      .beezio-preload-title {
        margin: 0 0 8px;
        color: #111827;
        font-weight: 800;
        font-size: 30px;
        line-height: 1.2;
      }

      .beezio-preload-subtitle {
        margin: 0 0 20px;
        color: #374151;
        font-size: 16px;
      }

      .beezio-preload-bar {
        width: 180px;
        height: 6px;
        border-radius: 999px;
        background: #fde68a;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
      }

      .beezio-preload-bar::after {
        content: "";
        position: absolute;
        left: -40%;
        top: 0;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #f59e0b, #ea580c);
        animation: beezio-progress 1.1s ease-in-out infinite;
        border-radius: inherit;
      }

      @keyframes beezio-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      @keyframes beezio-progress {
        0% {
          left: -40%;
        }

        100% {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="beezio-preload" class="beezio-preload">
        <div class="beezio-preload-card">
          <img src="/bzobee.png" alt="Beezio" class="beezio-preload-logo" />
          <h1 class="beezio-preload-title">Welcome to Beezio</h1>
          <p class="beezio-preload-subtitle">Setting up your marketplace...</p>
          <div class="beezio-preload-bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        window.__beezioBooted = false;

        const updatePreloadMessage = function (text) {
          try {
            var subtitle = document.querySelector('.beezio-preload-subtitle');
            if (subtitle) subtitle.textContent = text;
          } catch (_) {}
        };

        window.setTimeout(function () {
          var preload = document.getElementById('beezio-preload');
          if (window.__beezioBooted || !preload) return;

          var url = new URL(window.location.href);
          var tried = url.searchParams.get('boot_retry') === '1';

          if (!tried) {
            url.searchParams.set('boot_retry', '1');
            window.location.replace(url.toString());
            return;
          }

          updatePreloadMessage('Loading is taking longer than expected.');

          var retry = document.createElement('button');
          retry.type = 'button';
          retry.textContent = 'Retry';
          retry.style.marginTop = '16px';
          retry.style.padding = '10px 16px';
          retry.style.borderRadius = '10px';
          retry.style.border = '1px solid #d97706';
          retry.style.background = '#ffcb05';
          retry.style.color = '#101820';
          retry.style.fontWeight = '700';
          retry.style.cursor = 'pointer';

          retry.addEventListener('click', function () {
            Promise.resolve()
              .then(function () {
                if (!('serviceWorker' in navigator)) return;
                return navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.all(regs.map(function (r) { return r.unregister(); }));
                });
              })
              .then(function () {
                if (!('caches' in window)) return;
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (key) { return caches.delete(key); }));
                });
              })
              .finally(function () {
                var fresh = new URL(window.location.href);
                fresh.searchParams.delete('boot_retry');
                fresh.searchParams.set('boot_bust', String(Date.now()));
                window.location.replace(fresh.toString());
              });
          });

          var card = preload.querySelector('.beezio-preload-card');
          if (card && !card.querySelector('[data-beezio-retry]')) {
            retry.setAttribute('data-beezio-retry', '1');
            card.appendChild(retry);
          }
        }, 12000);
      })();
    </script>
    <script>
      (function () {
        var BOOTSTRAP_VERSION = '2026-05-22-cache-reset-1';
        var STORAGE_KEY = 'beezio_bootstrap_version';
        var RELOAD_KEY = 'beezio_bootstrap_reload';

        try {
          var currentVersion = window.localStorage.getItem(STORAGE_KEY);
          if (currentVersion === BOOTSTRAP_VERSION) return;
          window.localStorage.setItem(STORAGE_KEY, BOOTSTRAP_VERSION);

          Promise.resolve()
            .then(function () {
              if (!('serviceWorker' in navigator)) return;
              return navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
              });
            })
            .then(function () {
              if (!('caches' in window)) return;
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (key) { return caches.delete(key); }));
              });
            })
            .finally(function () {
              try {
                if (window.sessionStorage.getItem(RELOAD_KEY) === BOOTSTRAP_VERSION) return;
                window.sessionStorage.setItem(RELOAD_KEY, BOOTSTRAP_VERSION);
              } catch (_) {}

              var freshUrl = new URL(window.location.href);
              freshUrl.searchParams.set('boot_bust', String(Date.now()));
              window.location.replace(freshUrl.toString());
            });
        } catch (_) {}
      })();
    </script>
    <!-- Service worker registration is handled by client script (swRegister) to provide a safe update flow -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
